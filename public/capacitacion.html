<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTC — Capacitación Elite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #070708;
      --ink2: #0A0A0C;
      --ink3: #0F0F12;
      --cream: #EAE6DF;
      --muted: #706C66;
      --gold: #B89A6A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--ink); color: var(--cream); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.7; }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(7,7,8,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(42,40,36,.5);
      padding: 0 2rem;
      height: 56px;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: .15em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-top: 56px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--ink2) 0%, var(--ink3) 100%);
    }
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      z-index: 0;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 4rem 2rem;
      max-width: 700px;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 300;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    .hero h1 em { color: var(--gold); font-style: italic; }
    .hero p {
      max-width: 600px;
      margin: 0 auto 2.5rem;
      color: rgba(234,230,223,.8);
      font-size: .95rem;
    }

    .form-panel {
      position: absolute;
      top: 80px;
      right: 2rem;
      width: 320px;
      background: rgba(10,10,12,.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(184,154,106,.2);
      border-radius: 8px;
      padding: 2rem;
      z-index: 50;
    }
    .form-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.2rem;
      color: var(--gold);
    }
    .form-panel h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      margin-bottom: .5rem;
    }
    .form-panel p {
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .5rem;
    }
    input, select {
      width: 100%;
      padding: .75rem;
      background: rgba(20,20,24,.6);
      border: 1px solid rgba(42,40,36,.8);
      border-radius: 4px;
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
    }
    input:focus, select:focus { outline: none; border-color: var(--gold); }
    input::placeholder { color: var(--muted); }
    select option { background: var(--ink2); }

    button {
      width: 100%;
      padding: .85rem;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 4px;
      font-weight: 500;
      font-size: .85rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: .2s;
    }
    button:hover { background: #CDB28C; }

    .modules-view {
      display: none;
      padding: 4rem 2rem;
      background: var(--ink3);
    }
    .modules-view.active { display: block; }

    .modules-grid {
      max-width: 1100px;
      margin: 0 auto;
    }
    .modules-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      margin-bottom: 3rem;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: rgba(42,40,36,.5);
    }
    .grid-item {
      background: var(--ink2);
      padding: 1.5rem;
      cursor: pointer;
      transition: .2s;
      border: none;
      text-align: left;
      color: inherit;
    }
    .grid-item:hover { background: var(--ink); }
    .grid-item-num { font-size: .65rem; letter-spacing: .2em; color: #8B7250; text-transform: uppercase; margin-bottom: .5rem; }
    .grid-item-name { font-size: .95rem; font-weight: 400; margin-bottom: .4rem; }
    .grid-item-desc { font-size: .78rem; color: var(--muted); }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7,7,8,.98);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .modal.show { display: flex; }

    .modal-content {
      width: 100%;
      max-width: 900px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: -45px;
      right: 0;
      background: none;
      border: none;
      color: var(--cream);
      font-size: 2rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
    }
    .modal-close:hover { color: var(--gold); }

    video {
      width: 100%;
      height: auto;
      background: #000;
      border-radius: 8px;
    }

    .modal-info {
      margin-top: 2rem;
      text-align: center;
    }
    .modal-info h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      margin-bottom: .5rem;
    }
    .modal-info p {
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .form-panel { width: 100%; position: relative; top: auto; right: auto; margin-top: 2rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo">V T C · Capacitación</div>
  </div>
</nav>

<section class="hero">
  <video class="hero-bg" autoplay muted loop playsinline>
    <source src="https://vtc-capacitacion-deploy.vercel.app/videos/modulo-WEL.mp4" type="video/mp4">
  </video>
  <div class="hero-content">
    <h1>Bienvenido a tu <em>Capacitación</em></h1>
    <p>Accede a tu entrenamiento personal · VTC</p>
  </div>

  <div class="form-panel">
    <div class="form-icon">V</div>
    <h3>Victor</h3>
    <p>Tu entrenador personal</p>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" id="userName" placeholder="Tu nombre" required>
      </div>
      <div class="form-group">
        <label class="form-label">Número de Empleado</label>
        <input type="text" id="empId" placeholder="Ej. 12345" required>
      </div>
      <div class="form-group">
        <label class="form-label">Departamento</label>
        <select id="dept" required>
          <option value="">Selecciona...</option>
          <option value="OPC">OPC</option>
          <option value="Liner">Liner</option>
          <option value="Closer">Closer</option>
          <option value="Manager">Manager</option>
        </select>
      </div>
      <button type="submit">Comenzar Capacitación</button>
    </form>
  </div>
</section>

<section class="modules-view" id="modulesView">
  <div class="modules-grid">
    <h2 class="modules-title">Módulos de Capacitación</h2>
    <div class="grid" id="modulesGrid"></div>
  </div>
</section>

<div class="modal" id="videoModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <video id="player" controls controlsList="nodownload">
    </video>
    <div class="modal-info">
      <h2 id="videoTitle"></h2>
      <p id="videoDesc"></p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async></script>
<div id="vw-launch" data-agent-id="agent_5701kr0h5gg6eetb69tv6c5hwfj1"></div>

<script>
const MODULES = [
  { id: 'WEL', title: 'Bienvenida', desc: 'Introducción' },
  { id: '00', title: 'Fundamentos VTC', desc: 'Base del negocio' },
  { id: '01', title: 'Psicología del Vendedor', desc: 'Mentalidad ganadora' },
  { id: '02', title: 'Calificación de Prospectos', desc: 'Prospecto ideal' },
  { id: '03', title: 'OPC - Captura y Abordaje', desc: 'Primer eslabón' },
  { id: '04', title: 'Rapport y PNL', desc: 'Conexiones auténticas' },
  { id: '05', title: 'El Tour', desc: 'Presentación del resort' },
  { id: '06', title: 'Datos Duros', desc: 'El pitch que convence' },
  { id: '07', title: 'El Cierre', desc: 'Dos cierres probados' },
  { id: '08', title: 'Objeciones', desc: 'La verdad detrás' },
  { id: '09', title: 'TOC', desc: 'Técnica de objeción confirmada' },
  { id: '10', title: 'Manager Close', desc: 'Segunda oportunidad' },
  { id: '11', title: 'PNL Avanzado', desc: 'Anclaje emocional' },
  { id: 'M0', title: 'Nacionalidades - Inglés', desc: 'Scripts EN' },
  { id: 'M1', title: 'Nacionalidades - Francés', desc: 'Scripts FR' },
  { id: 'M2', title: 'Nacionalidades - Canadiense', desc: 'Scripts CA' },
  { id: 'M3', title: 'Nacionalidades - Alemán', desc: 'Scripts DE' },
  { id: 'M4', title: 'Nacionalidades - Italiano', desc: 'Scripts IT' },
  { id: 'M5', title: 'Nacionalidades - Portugués', desc: 'Scripts PT' },
  { id: 'M6', title: 'Nacionalidades - Español', desc: 'Scripts ES' },
  { id: 'M7', title: 'Nacionalidades - Ruso', desc: 'Scripts RU' },
  { id: 'M8', title: 'Nacionalidades - Chino', desc: 'Scripts ZH' },
  { id: 'M9', title: 'Nacionalidades - Árabe', desc: 'Scripts AR' },
  { id: 'M10', title: 'Nacionalidades - Hebreo', desc: 'Scripts HE' },
  { id: 'M11', title: 'Nacionalidades - Sueco', desc: 'Scripts SV' },
  { id: 'M12', title: 'Nacionalidades - Holandés', desc: 'Scripts NL' },
  { id: 'PV', title: 'Visión 360°', desc: 'Perspectivas múltiples' },
  { id: 'F', title: 'Ética y Compliance', desc: 'Marco normativo' },
  { id: 'FIN', title: 'Examen Final', desc: 'Valida aprendizaje' },
];

document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  localStorage.setItem('vtcUser', JSON.stringify({
    name: document.getElementById('userName').value,
    empId: document.getElementById('empId').value,
    dept: document.getElementById('dept').value
  }));
  document.getElementById('modulesView').classList.add('active');
  renderModules();
});

function renderModules() {
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = MODULES.map(m => `
    <button class="grid-item" onclick="playModule('${m.id}', '${m.title}', '${m.desc}')">
      <div class="grid-item-num">Módulo ${m.id}</div>
      <div class="grid-item-name">${m.title}</div>
      <div class="grid-item-desc">${m.desc}</div>
    </button>
  `).join('');
}

function playModule(id, title, desc) {
  const player = document.getElementById('player');
  const videoUrl = `https://vtc-capacitacion-deploy.vercel.app/videos/modulo-${id}.mp4`;

  player.src = videoUrl;
  document.getElementById('videoTitle').textContent = title;
  document.getElementById('videoDesc').textContent = desc;
  document.getElementById('videoModal').classList.add('show');

  player.play();
}

function closeModal() {
  const player = document.getElementById('player');
  player.pause();
  player.src = '';
  document.getElementById('videoModal').classList.remove('show');
}

window.addEventListener('load', () => {
  if (localStorage.getItem('vtcUser')) {
    document.getElementById('modulesView').classList.add('active');
    renderModules();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>

</body>
</html>
