<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b89a6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#0d0d0f"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#b89a6a" stroke-width="2"/>

  <!-- V letter -->
  <text x="100" y="140" font-family="Cormorant Garamond, serif" font-size="120" font-weight="500" text-anchor="middle" fill="url(#grad)" letter-spacing="2">V</text>
</svg>
